<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 – Go Home</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #0d0d0d;
      color: #f0f0f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: grid;
      place-items: center;
      text-align: center;
      overflow: hidden;
    }

    .container {
      max-width: 620px;
      padding: 20px;
    }

    h1 {
      font-size: 9rem;
      margin: 0;
      line-height: 0.8;
      font-weight: 900;
      letter-spacing: -8px;
      background: linear-gradient(90deg, #ff6b6b, #4ecdc4, #45b7d1);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 40px rgba(255,107,107,0.4);
    }

    h2 {
      font-size: 2.8rem;
      margin: 0.4em 0 0.7em;
      color: #ff6b6b;
    }

    .subtitle {
      font-size: 1.35rem;
      opacity: 0.85;
      margin: 1.2em 0 2em;
      line-height: 1.5;
    }

    .go-home-btn {
      display: inline-block;
      padding: 16px 42px;
      font-size: 1.3rem;
      font-weight: bold;
      color: white;
      background: #ff4757;
      border: none;
      border-radius: 50px;
      text-decoration: none;
      transition: all 0.22s;
      box-shadow: 0 8px 25px rgba(255,71,87,0.35);
      cursor: pointer;
    }

    .go-home-btn:hover {
      transform: translateY(-4px) scale(1.06);
      box-shadow: 0 14px 40px rgba(255,71,87,0.5);
      background: #ff6b81;
    }

    .small-hint {
      margin-top: 3.5rem;
      font-size: 0.95rem;
      opacity: 0.5;
    }

    .ghost {
      position: absolute;
      bottom: 8%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 8rem;
      opacity: 0.07;
      pointer-events: none;
      user-select: none;
    }

    @media (max-width: 600px) {
      h1 { font-size: 6.5rem; letter-spacing: -6px; }
      h2 { font-size: 2.2rem; }
      .subtitle { font-size: 1.15rem; }
    }
  </style>
</head>
<body>

  <div class="container">

    <a href="/" class="go-home-btn">← Take me home</a>

    <div class="small-hint">
      (or keep wandering in the void, I'm not your mom)
    </div>
  </div>

  <div class="ghost">👻</div>

</body>
</html>
